[project]
name = "telegramtransport"
version = "0.1.0"
description = "Telegram transport runner for LocalFirstClaw"
requires-python = ">=3.12"
dependencies = [
    "gateway>=0.1.0",
    "journal>=0.1.0",
    "tools>=0.1.0",
    "httpx>=0.28.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "black>=23.11.0",
    "ruff>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
