[project]
name = "hypothalamus"
version = "0.1.0"
description = "APScheduler-based autonomous scheduling system"
requires-python = ">=3.12"
dependencies = [
    "apscheduler>=3.10.0",
    "pydantic>=2.5.0",
    "pyyaml>=6.0.0",
    "journal>=0.1.0",
    "agentinterface>=0.1.0",
    "tools>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "black>=23.11.0",
    "ruff>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
