[project]
name = "tools"
version = "0.1.0"
description = "Reusable tool library"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.5.0",
    "journal>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "black>=23.11.0",
    "ruff>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
